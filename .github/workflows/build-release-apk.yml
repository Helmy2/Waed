name: Build Release APK

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab
  push:
    tags:
      - 'v*' # Automatically runs if you push a tag like v1.0.0

jobs:
  build-release:
    name: Build and Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > keystore.jks

      - name: Sign APK
        run: |
          # Find the newest build tools directory automatically
          BUILD_TOOLS=$(ls -d /usr/local/lib/android/sdk/build-tools/* | tail -1)
          
          # Zipalign the APK (optimizes it for Android)
          $BUILD_TOOLS/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk app-release-aligned.apk
          
          # Sign the APK
          $BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEY_STORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app-release-signed.apk \
            app-release-aligned.apk

      - name: Clean up Keystore
        if: always()
        run: rm -f keystore.jks

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Waed-Release-APK
          path: app-release-signed.apk
          retention-days: 7